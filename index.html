<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Skyjo</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lilita+One&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0f4ff;
  --card: #ffffff;
  --border: #e2e8ff;
  --text: #1e1b4b;
  --muted: #7c83b0;
  --radius: 16px;
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 40px;
  background-image: radial-gradient(circle at 20% 20%, #dde4ff 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, #fce4ff 0%, transparent 50%);
}

header {
  text-align: center;
  padding: 28px 16px 16px;
}
header h1 {
  font-family: 'Lilita One', cursive;
  font-size: 2.8rem;
  background: linear-gradient(135deg, #6366f1, #ec4899, #f97316);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 1px;
}
header p {
  color: var(--muted);
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 2px;
}

.container { max-width: 540px; margin: 0 auto; padding: 0 16px; }

.card {
  background: var(--card);
  border-radius: var(--radius);
  border: 2px solid var(--border);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(99,102,241,0.08);
}

.section-label {
  font-size: 0.72rem;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

#player-inputs { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }

.player-row { display: flex; align-items: center; gap: 8px; }

.player-color-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
}

.player-row input {
  flex: 1;
  padding: 12px 14px;
  border: 2px solid var(--border);
  border-radius: 12px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  background: var(--bg);
  color: var(--text);
  outline: none;
  -webkit-appearance: none;
  appearance: none;
}
.player-row input:focus { border-color: #6366f1; }

.btn-remove {
  width: 36px; height: 36px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
}

.btn-add {
  width: 100%;
  padding: 11px;
  border: 2px dashed var(--border);
  border-radius: 12px;
  background: none;
  font-family: 'Nunito', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  margin-bottom: 16px;
}

.limit-btn {
  flex: 1;
  padding: 10px;
  border: 2px solid var(--border);
  border-radius: 12px;
  background: white;
  font-family: 'Nunito', sans-serif;
  font-size: 0.95rem;
  font-weight: 800;
  color: var(--muted);
  cursor: pointer;
}
.limit-btn.sel {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  border-color: #6366f1;
}
.btn-start {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  border: none;
  border-radius: 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(99,102,241,0.35);
}

#game-screen { display: none; }

.game-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.round-pill {
  font-family: 'Lilita One', cursive;
  font-size: 1.1rem;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  padding: 6px 16px;
  border-radius: 999px;
  box-shadow: 0 2px 8px rgba(99,102,241,0.3);
}

.btn-reset {
  padding: 7px 14px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: white;
  font-family: 'Nunito', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
}

.players-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }

.player-card {
  border-radius: var(--radius);
  border: 2.5px solid;
  padding: 14px 16px;
  background: white;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.player-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.player-card-name {
  font-size: 1rem;
  font-weight: 800;
  display: flex;
  align-items: center;
  gap: 8px;
}

.player-card-name .dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  display: inline-block;
}

.player-total {
  font-family: 'Lilita One', cursive;
  font-size: 1.8rem;
  line-height: 1;
}

.round-score-display {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 8px;
}

.quick-btns {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

.qbtn {
  flex: 1;
  min-width: 0;
  padding: 9px 4px;
  border-radius: 10px;
  border: 2px solid;
  font-family: 'Nunito', sans-serif;
  font-size: 0.85rem;
  font-weight: 800;
  cursor: pointer;
  text-align: center;
  background: white;
}
.qbtn.neg { border-color: #34d399; color: #059669; background: #ecfdf5; }
.qbtn.pos { border-color: #f87171; color: #dc2626; background: #fef2f2; }
.qbtn.sel-neg { background: #34d399 !important; color: white !important; border-color: #34d399 !important; }
.qbtn.sel-pos { background: #f87171 !important; color: white !important; border-color: #f87171 !important; }

.manual-input-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.manual-input-row input {
  width: 80px;
  padding: 8px 10px;
  border: 2px solid var(--border);
  border-radius: 10px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  text-align: center;
  background: var(--bg);
  color: var(--text);
  outline: none;
  -webkit-appearance: none;
  appearance: none;
}
.manual-input-row input:focus { border-color: #6366f1; }
.manual-input-label { font-size: 0.75rem; font-weight: 700; color: var(--muted); }

.trigger-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: var(--bg);
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--muted);
  user-select: none;
  -webkit-user-select: none;
}
.trigger-toggle.active {
  background: #fffbeb;
  border-color: #fcd34d;
  color: #92400e;
}

.btn-validate {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, #10b981, #059669);
  color: white;
  border: none;
  border-radius: 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(16,185,129,0.35);
  margin-bottom: 16px;
}

.history-card {
  background: white;
  border-radius: var(--radius);
  border: 2px solid var(--border);
  overflow-x: auto;
  margin-bottom: 16px;
}

.history-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
.history-table th {
  padding: 8px 10px;
  font-size: 0.65rem;
  font-weight: 800;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: white;
  background: #6366f1;
  text-align: center;
  white-space: nowrap;
}
.history-table th:first-child { text-align: left; }
.history-table td {
  padding: 7px 10px;
  text-align: center;
  border-top: 1px solid var(--border);
  font-weight: 700;
}
.history-table td:first-child { text-align: left; font-weight: 800; }
.history-table .total-row td { background: #f5f3ff; font-weight: 900; font-size: 0.9rem; }
.trig-score { text-decoration: underline; }
.dbl-score { color: #f97316; }

#winner-screen {
  display: none;
  text-align: center;
  padding: 20px 16px 40px;
  max-width: 540px;
  margin: 0 auto;
}
.winner-emoji { font-size: 4rem; display: block; margin-bottom: 8px; }
.winner-title {
  font-family: 'Lilita One', cursive;
  font-size: 2rem;
  background: linear-gradient(135deg, #f97316, #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}
.winner-subtitle { color: var(--muted); font-size: 0.85rem; font-weight: 700; margin-bottom: 24px; }
.podium-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; text-align: left; }
.podium-row {
  display: flex;
  align-items: center;
  gap: 12px;
  background: white;
  border-radius: 14px;
  border: 2.5px solid var(--border);
  padding: 12px 16px;
}
.podium-row.first { border-color: #fcd34d; background: #fffbeb; }
.podium-rank { font-size: 1.4rem; width: 32px; text-align: center; }
.podium-name { flex: 1; font-weight: 800; font-size: 0.95rem; }
.podium-score { font-family: 'Lilita One', cursive; font-size: 1.3rem; color: var(--muted); }
.podium-row.first .podium-score { color: #f59e0b; }
.btn-again {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  border: none;
  border-radius: 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(99,102,241,0.35);
}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup-screen">
  <header>
    <h1>Skyjo 🃏</h1>
    <p>Compteur de points</p>
  </header>
  <div class="container">
    <div class="card">
      <div class="section-label">Joueurs (2 à 8)</div>
      <div id="player-inputs"></div>
      <button class="btn-add" id="btn-add" type="button">＋ Ajouter un joueur</button>
      <div class="section-label" style="margin-top:16px">Limite de points</div>
      <div id="limit-btns" style="display:flex;gap:8px;margin-bottom:16px">
        <button type="button" class="limit-btn" data-val="20">20</button>
        <button type="button" class="limit-btn" data-val="50">50</button>
        <button type="button" class="limit-btn sel" data-val="100">100</button>
        <button type="button" class="limit-btn" data-val="150">150</button>
      </div>
      <button class="btn-start" id="btn-start" type="button">Commencer la partie 🎮</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="game-screen">
  <header><h1>Skyjo 🃏</h1></header>
  <div class="container">
    <div class="game-header">
      <div class="round-pill" id="round-label">Manche 1</div>
      <button class="btn-reset" id="btn-reset" type="button">↺ Recommencer</button>
    </div>
    <div class="history-card" id="history-card" style="display:none">
      <table class="history-table" id="history-table"></table>
    </div>
    <div class="players-grid" id="players-grid"></div>
    <button class="btn-validate" id="btn-validate" type="button">✓ Valider la manche</button>
  </div>
</div>

<!-- WINNER -->
<div id="winner-screen">
  <span class="winner-emoji">🏆</span>
  <div class="winner-title" id="winner-name"></div>
  <div class="winner-subtitle">remporte la partie !</div>
  <div class="podium-list" id="podium"></div>
  <div style="display:flex;flex-direction:column;gap:10px">
    <button class="btn-again" id="btn-replay" type="button">🔄 Rejouer avec les mêmes joueurs</button>
    <button class="btn-again" id="btn-new" type="button" style="background:linear-gradient(135deg,#f97316,#ec4899);box-shadow:0 4px 14px rgba(249,115,22,0.35)">👥 Changer les joueurs</button>
  </div>
</div>

<!-- PLAYER SELECTION MODAL -->
<div id="player-modal" style="display:none;position:fixed;inset:0;background:rgba(30,27,75,0.5);z-index:100;align-items:flex-end;justify-content:center">
  <div style="background:white;border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:540px;max-height:80vh;overflow-y:auto">
    <div style="font-family:Lilita One,cursive;font-size:1.3rem;margin-bottom:6px;color:#1e1b4b">Sélectionner les joueurs</div>
    <div style="font-size:0.78rem;font-weight:700;color:#7c83b0;margin-bottom:16px">Choisissez qui joue cette partie</div>
    <div id="modal-player-list" style="display:flex;flex-direction:column;gap:10px;margin-bottom:12px"></div>
    <div id="modal-new-players" style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px"></div>
    <button type="button" id="modal-add-player" style="width:100%;padding:10px;border:2px dashed #e2e8ff;border-radius:12px;background:none;font-family:Nunito,sans-serif;font-weight:700;font-size:0.85rem;color:#7c83b0;cursor:pointer;margin-bottom:12px">＋ Ajouter un joueur</button>
    <div style="display:flex;gap:10px">
      <button type="button" id="modal-cancel" style="flex:1;padding:12px;border:2px solid #e2e8ff;border-radius:12px;background:none;font-family:Nunito,sans-serif;font-weight:800;font-size:0.9rem;color:#7c83b0;cursor:pointer">Annuler</button>
      <button type="button" id="modal-start" style="flex:2;padding:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;border-radius:12px;font-family:Nunito,sans-serif;font-weight:800;font-size:0.9rem;cursor:pointer;box-shadow:0 4px 14px rgba(99,102,241,0.35)">Commencer ✓</button>
    </div>
  </div>
</div>

<script>
var COLOR_VALS = ['#f87171','#60a5fa','#34d399','#fbbf24','#a78bfa','#f97316','#ec4899','#14b8a6'];
var QUICK_SCORES = [-2, -1, 1, 2, 5, 10];

var players = [];
var rounds = [];
var selectedScores = {};
var triggerPlayer = null;

function initSetup() {
  document.getElementById('player-inputs').innerHTML = '';
  addPlayerRow();
  addPlayerRow();
}

function addPlayerRow() {
  var container = document.getElementById('player-inputs');
  if (container.children.length >= 8) return;
  var i = container.children.length;

  var row = document.createElement('div');
  row.className = 'player-row';

  var dot = document.createElement('div');
  dot.className = 'player-color-dot';
  dot.style.background = COLOR_VALS[i];

  var input = document.createElement('input');
  input.type = 'text';
  input.placeholder = 'Joueur ' + (i + 1);
  input.maxLength = 16;
  input.autocomplete = 'off';

  row.appendChild(dot);
  row.appendChild(input);

  if (i >= 2) {
    var btn = document.createElement('button');
    btn.className = 'btn-remove';
    btn.textContent = '×';
    btn.type = 'button';
    btn.addEventListener('click', function() {
      if (container.children.length > 2) {
        row.remove();
        Array.from(container.children).forEach(function(r, idx) {
          r.querySelector('.player-color-dot').style.background = COLOR_VALS[idx];
        });
      }
    });
    row.appendChild(btn);
  }
  container.appendChild(row);
}

var LIMIT = 100;

document.querySelectorAll('.limit-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.limit-btn').forEach(function(b){ b.classList.remove('sel'); });
    btn.classList.add('sel');
    LIMIT = parseInt(btn.dataset.val);
  });
});

document.getElementById('btn-add').addEventListener('click', addPlayerRow);

document.getElementById('btn-start').addEventListener('click', function() {
  var inputs = document.querySelectorAll('#player-inputs input');
  players = Array.from(inputs).map(function(inp, i) {
    return { name: inp.value.trim() || ('Joueur ' + (i + 1)), color: COLOR_VALS[i] };
  });
  rounds = [];
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  startRound();
});

function startRound() {
  selectedScores = {};
  triggerPlayer = null;
  players.forEach(function(p) { selectedScores[p.name] = 0; });
  document.getElementById('round-label').textContent = 'Manche ' + (rounds.length + 1);
  renderHistory();
  renderCards();
}

function getTotals() {
  var t = {};
  players.forEach(function(p) { t[p.name] = 0; });
  rounds.forEach(function(r) {
    players.forEach(function(p) { t[p.name] += r.scores[p.name]; });
  });
  return t;
}

function renderHistory() {
  if (rounds.length === 0) {
    document.getElementById('history-card').style.display = 'none';
    return;
  }
  document.getElementById('history-card').style.display = 'block';
  var t = getTotals();

  var html = '<thead><tr><th>Joueur</th>';
  for (var i = 0; i < rounds.length; i++) html += '<th>M' + (i+1) + '</th>';
  html += '<th>Total</th></tr></thead><tbody>';

  players.forEach(function(p) {
    html += '<tr><td>' + p.name + '</td>';
    rounds.forEach(function(r) {
      var s = r.scores[p.name];
      var cls = '';
      if (r.trigger === p.name) cls = ' class="trig-score"';
      if (r.doubled === p.name) cls = ' class="dbl-score"';
      html += '<td' + cls + '>' + s + '</td>';
    });
    html += '<td>' + t[p.name] + '</td></tr>';
  });
  html += '</tbody>';
  document.getElementById('history-table').innerHTML = html;
}

function renderCards() {
  var grid = document.getElementById('players-grid');
  grid.innerHTML = '';
  var t = getTotals();

  players.forEach(function(p) {
    var card = document.createElement('div');
    card.className = 'player-card';
    card.style.borderColor = p.color;

    // Header
    var hdr = document.createElement('div');
    hdr.className = 'player-card-header';

    var nameEl = document.createElement('div');
    nameEl.className = 'player-card-name';
    nameEl.innerHTML = '<span class="dot" style="background:' + p.color + '"></span>' + p.name;

    var totalEl = document.createElement('div');
    totalEl.className = 'player-total';
    totalEl.style.color = p.color;
    totalEl.textContent = t[p.name];

    hdr.appendChild(nameEl);
    hdr.appendChild(totalEl);
    card.appendChild(hdr);

    // Preview
    var preview = document.createElement('div');
    preview.className = 'round-score-display';
    preview.textContent = selectedScores[p.name] !== null
      ? 'Cette manche : ' + (selectedScores[p.name] > 0 ? '+' : '') + selectedScores[p.name]
      : 'Score à saisir...';
    card.appendChild(preview);

    // Quick buttons
    var qrow = document.createElement('div');
    qrow.className = 'quick-btns';
    QUICK_SCORES.forEach(function(val) {
      var btn = document.createElement('button');
      btn.type = 'button';
      var isNeg = val < 0;
      var isSelected = false;
      btn.className = 'qbtn ' + (isNeg ? 'neg' : 'pos');
      btn.textContent = (val > 0 ? '+' : '') + val;
      (function(v, pname) {
        btn.addEventListener('click', function() {
          if (selectedScores[pname] === null) selectedScores[pname] = 0;
          selectedScores[pname] += v;
          var mi = document.getElementById('mi-' + pname);
          if (mi) mi.value = selectedScores[pname];
          renderCards();
        });
      })(val, p.name);
      qrow.appendChild(btn);
    });
    card.appendChild(qrow);

    // Manual input
    var mrow = document.createElement('div');
    mrow.className = 'manual-input-row';
    var mlabel = document.createElement('span');
    mlabel.className = 'manual-input-label';
    mlabel.textContent = 'Total :';
    var minput = document.createElement('input');
    minput.type = 'number';
    minput.id = 'mi-' + p.name;
    minput.placeholder = '0';
    minput.inputMode = 'numeric';
    if (selectedScores[p.name] !== null) minput.value = selectedScores[p.name];
    (function(pname) {
      minput.addEventListener('change', function() {
        var v = parseInt(this.value);
        if (!isNaN(v)) { selectedScores[pname] = v; renderCards(); }
      });
    })(p.name);
    var resetBtn = document.createElement('button');
    resetBtn.type = 'button';
    resetBtn.textContent = '✕';
    resetBtn.style.cssText = 'padding:6px 10px;border:2px solid #e2e8ff;border-radius:8px;background:none;font-family:Nunito,sans-serif;font-weight:800;color:#7c83b0;cursor:pointer;font-size:0.85rem;';
    (function(pname) {
      resetBtn.addEventListener('click', function() {
        selectedScores[pname] = null;
        renderCards();
      });
    })(p.name);
    mrow.appendChild(mlabel);
    mrow.appendChild(minput);
    mrow.appendChild(resetBtn);
    card.appendChild(mrow);

    // Trigger
    var trig = document.createElement('div');
    trig.className = 'trigger-toggle' + (triggerPlayer === p.name ? ' active' : '');
    trig.innerHTML = '<span>⭐</span> A déclenché la fin de manche';
    (function(pname) {
      trig.addEventListener('click', function() {
        triggerPlayer = triggerPlayer === pname ? null : pname;
        renderCards();
      });
    })(p.name);
    card.appendChild(trig);

    grid.appendChild(card);
  });
}

document.getElementById('btn-validate').addEventListener('click', function() {


  var rawScores = {};
  players.forEach(function(p) { rawScores[p.name] = selectedScores[p.name]; });

  var finalScores = {};
  players.forEach(function(p) { finalScores[p.name] = rawScores[p.name]; });

  var doubled = null;
  if (triggerPlayer) {
    var minScore = Math.min.apply(null, players.map(function(p){ return rawScores[p.name]; }));
    if (rawScores[triggerPlayer] > minScore) {
      finalScores[triggerPlayer] = rawScores[triggerPlayer] * 2;
      doubled = triggerPlayer;
    }
  }

  if (triggerPlayer === null) {
    alert('Indique qui a déclenché la fin de la manche ! ⭐');
    return;
  }
  rounds.push({ scores: finalScores, trigger: triggerPlayer, doubled: doubled });

  var t = getTotals();
  if (players.some(function(p){ return t[p.name] >= LIMIT; })) {
    showWinner();
    return;
  }
  startRound();
});

document.getElementById('btn-reset').addEventListener('click', function() {
  showPlayerModal();
});

function showWinner() {
  var t = getTotals();
  var sorted = players.slice().sort(function(a, b){ return t[a.name] - t[b.name]; });

  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('winner-screen').style.display = 'block';
  document.getElementById('winner-name').textContent = sorted[0].name + ' 🎉';

  var medals = ['🥇','🥈','🥉'];
  var podium = document.getElementById('podium');
  podium.innerHTML = '';
  sorted.forEach(function(p, i) {
    var row = document.createElement('div');
    row.className = 'podium-row' + (i === 0 ? ' first' : '');
    row.innerHTML = '<div class="podium-rank">' + (medals[i] || (i+1)+'.') + '</div>'
      + '<div class="podium-name" style="color:' + p.color + '">' + p.name + '</div>'
      + '<div class="podium-score">' + t[p.name] + ' pts</div>';
    podium.appendChild(row);
  });
}

// Replay with same players
document.getElementById('btn-replay').addEventListener('click', function() {
  rounds = [];
  document.getElementById('winner-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  startRound();
});

// Change players
document.getElementById('btn-new').addEventListener('click', function() {
  document.getElementById('winner-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'block';
  initSetup();
});

// Modal logic
function showPlayerModal() {
  var modal = document.getElementById('player-modal');
  var list = document.getElementById('modal-player-list');
  modal.style.display = 'flex';
  list.innerHTML = '';
  // Use players from last game or current players
  var allPlayers = players.length > 0 ? players : [];
  allPlayers.forEach(function(p, i) {
    var row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:12px;padding:12px 14px;border:2px solid #e2e8ff;border-radius:12px;cursor:pointer;';
    var cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = true;
    cb.id = 'modal-cb-' + i;
    cb.style.cssText = 'width:20px;height:20px;accent-color:' + p.color + ';cursor:pointer;flex-shrink:0';
    var dot = document.createElement('div');
    dot.style.cssText = 'width:12px;height:12px;border-radius:50%;background:' + p.color + ';flex-shrink:0';
    var name = document.createElement('label');
    name.htmlFor = 'modal-cb-' + i;
    name.style.cssText = 'font-family:Nunito,sans-serif;font-weight:800;font-size:0.95rem;cursor:pointer;flex:1';
    name.textContent = p.name;
    row.appendChild(cb);
    row.appendChild(dot);
    row.appendChild(name);
    row.addEventListener('click', function(e) {
      if (e.target !== cb) cb.checked = !cb.checked;
    });
    list.appendChild(row);
  });
}

document.getElementById('modal-cancel').addEventListener('click', function() {
  document.getElementById('player-modal').style.display = 'none';
  if (rounds.length > 0) {
    document.getElementById('game-screen').style.display = 'block';
  }
});

// Add new player row in modal
document.getElementById('modal-add-player').addEventListener('click', function() {
  var container = document.getElementById('modal-new-players');
  var existing = document.querySelectorAll('#modal-player-list input[type=checkbox]').length;
  var total = existing + container.children.length;
  if (total >= 8) { alert('Maximum 8 joueurs !'); return; }

  var row = document.createElement('div');
  row.style.cssText = 'display:flex;align-items:center;gap:8px';

  var colorIdx = total;
  var dot = document.createElement('div');
  dot.style.cssText = 'width:12px;height:12px;border-radius:50%;background:' + COLOR_VALS[colorIdx] + ';flex-shrink:0';

  var input = document.createElement('input');
  input.type = 'text';
  input.placeholder = 'Nom du joueur';
  input.maxLength = 16;
  input.autocomplete = 'off';
  input.style.cssText = 'flex:1;padding:10px 12px;border:2px solid #e2e8ff;border-radius:10px;font-family:Nunito,sans-serif;font-size:0.9rem;font-weight:700;background:#f0f4ff;color:#1e1b4b;outline:none;';

  var removeBtn = document.createElement('button');
  removeBtn.type = 'button';
  removeBtn.textContent = '×';
  removeBtn.style.cssText = 'width:34px;height:34px;border:2px solid #e2e8ff;border-radius:8px;background:none;font-weight:800;font-size:1rem;color:#7c83b0;cursor:pointer;flex-shrink:0;font-family:Nunito,sans-serif';
  removeBtn.addEventListener('click', function() { row.remove(); });

  row.appendChild(dot);
  row.appendChild(input);
  row.appendChild(removeBtn);
  container.appendChild(row);
  input.focus();
});

document.getElementById('modal-start').addEventListener('click', function() {
  var checkboxes = document.querySelectorAll('#modal-player-list input[type=checkbox]');
  var selected = [];
  checkboxes.forEach(function(cb, i) {
    if (cb.checked) selected.push(players[i]);
  });

  // Add new players from input fields
  var newInputs = document.querySelectorAll('#modal-new-players input[type=text]');
  var newIdx = selected.length;
  newInputs.forEach(function(inp) {
    var name = inp.value.trim();
    if (name) {
      selected.push({ name: name, color: COLOR_VALS[newIdx] });
      newIdx++;
    }
  });

  if (selected.length < 2) { alert('Sélectionne au moins 2 joueurs !'); return; }

  players = selected.map(function(p, i) {
    return { name: p.name, color: COLOR_VALS[i] };
  });
  rounds = [];
  document.getElementById('modal-new-players').innerHTML = '';
  document.getElementById('player-modal').style.display = 'none';
  document.getElementById('winner-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  startRound();
});

initSetup();
</script>
