<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyjo — Compteur de points</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f2eb;
    --surface: #ffffff;
    --border: #e0d9cc;
    --text: #1a1814;
    --muted: #8a8070;
    --accent: #2d6a4f;
    --accent-light: #d8f3dc;
    --danger: #c0392b;
    --danger-light: #fdf0ef;
    --gold: #b8860b;
    --gold-light: #fef9e7;
    --radius: 12px;
  }
  body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px 16px 60px; }
  header { text-align: center; margin-bottom: 36px; }
  header h1 { font-family: 'Fraunces', serif; font-weight: 300; font-size: clamp(2rem, 6vw, 3rem); letter-spacing: -0.02em; }
  header h1 em { font-style: italic; color: var(--accent); }
  header p { color: var(--muted); font-size: 0.75rem; margin-top: 4px; letter-spacing: 0.08em; text-transform: uppercase; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  #setup { max-width: 460px; margin: 0 auto; }
  .setup-label { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .player-inputs { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .player-row { display: flex; align-items: center; gap: 8px; }
  .player-row input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 0.85rem; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s; }
  .player-row input:focus { border-color: var(--accent); }
  .player-row input::placeholder { color: var(--muted); }
  .btn-remove { background: none; border: 1px solid var(--border); border-radius: 8px; width: 36px; height: 36px; cursor: pointer; color: var(--muted); font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .btn-remove:hover { border-color: var(--danger); color: var(--danger); }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 18px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.15s; letter-spacing: 0.03em; border: 1px solid transparent; }
  .btn-ghost { background: none; border-color: var(--border); color: var(--text); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #245a40; }
  .btn-primary:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  .btn-danger { background: none; border-color: var(--border); color: var(--danger); }
  .btn-danger:hover { border-color: var(--danger); background: var(--danger-light); }
  .setup-actions { display: flex; gap: 8px; margin-top: 8px; }
  #game { max-width: 680px; margin: 0 auto; display: none; }
  .scoreboard { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .scoreboard th { font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 500; }
  .scoreboard td { padding: 10px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .scoreboard tr:last-child td { border-bottom: none; }
  .player-name-cell { font-family: 'Fraunces', serif; font-weight: 300; font-size: 1rem; }
  .total-cell { font-weight: 500; font-size: 1rem; }
  .tag-trigger { display: inline-block; background: var(--danger-light); color: var(--danger); border-radius: 4px; padding: 2px 6px; font-size: 0.65rem; letter-spacing: 0.05em; }
  .tag-penalty { display: inline-block; background: #fff3cd; color: #856404; border-radius: 4px; padding: 2px 6px; font-size: 0.65rem; letter-spacing: 0.05em; margin-left: 4px; }
  .leader-row td { background: var(--accent-light); }
  .round-form { max-width: 680px; margin: 0 auto; display: none; }
  .round-form .card-title { font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 300; margin-bottom: 16px; }
  .round-inputs { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .round-row { display: flex; align-items: center; gap: 10px; }
  .round-row label { flex: 1; font-size: 0.85rem; }
  .round-row input[type="number"] { width: 80px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 0.85rem; background: var(--bg); text-align: center; outline: none; transition: border-color 0.2s; }
  .round-row input[type="number"]:focus { border-color: var(--accent); }
  .trigger-select { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .trigger-select select { padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 0.82rem; background: var(--bg); color: var(--text); outline: none; }
  #winner-screen { max-width: 460px; margin: 0 auto; display: none; }
  .winner-card { text-align: center; padding: 40px 24px; background: var(--gold-light); border-color: #e6c96a; }
  .winner-crown { font-size: 3rem; margin-bottom: 12px; }
  .winner-name { font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 600; color: var(--gold); }
  .winner-score { font-size: 0.8rem; color: var(--muted); margin-top: 6px; }
  .section-title { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .info-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .manche-badge { background: var(--accent-light); color: var(--accent); border-radius: 6px; padding: 4px 10px; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.05em; }
  .note { font-size: 0.72rem; color: var(--muted); margin-top: 10px; line-height: 1.5; }
</style>
</head>
<body>

<header>
  <h1>Sky<em>jo</em></h1>
  <p>Compteur de points</p>
</header>

<div id="setup">
  <div class="card">
    <div class="setup-label">Joueurs (2 à 8)</div>
    <div class="player-inputs" id="player-inputs"></div>
    <div class="setup-actions">
      <button class="btn btn-ghost" onclick="addPlayer()">+ Ajouter</button>
      <button class="btn btn-primary" id="btn-start" onclick="startGame()">Commencer</button>
    </div>
  </div>
</div>

<div id="game">
  <div class="card">
    <div class="info-bar">
      <div class="section-title">Tableau des scores</div>
      <div class="manche-badge" id="manche-badge">Manche 1</div>
    </div>
    <table class="scoreboard" id="scoreboard"></table>
  </div>
  <div style="display:flex; gap:8px; max-width:680px; margin:0 auto;">
    <button class="btn btn-primary" style="flex:1" onclick="showRoundForm()">+ Saisir la manche</button>
    <button class="btn btn-danger" onclick="resetGame()">Recommencer</button>
  </div>
</div>

<div class="round-form card" id="round-form">
  <div class="card-title" id="form-title">Manche 1 — Scores</div>
  <div class="trigger-select">
    <div class="setup-label">Qui a déclenché la fin ?</div>
    <select id="trigger-select"></select>
  </div>
  <div class="setup-label">Scores bruts des joueurs</div>
  <div class="round-inputs" id="round-inputs"></div>
  <p class="note">⚠️ Si le déclencheur n'a pas le score le plus bas, ses points sont <strong>doublés</strong>.</p>
  <div style="display:flex; gap:8px; margin-top:16px;">
    <button class="btn btn-ghost" onclick="cancelRound()">Annuler</button>
    <button class="btn btn-primary" style="flex:1" onclick="submitRound()">Valider la manche</button>
  </div>
</div>

<div id="winner-screen">
  <div class="card winner-card">
    <div class="winner-crown">🏆</div>
    <div class="winner-name" id="winner-name"></div>
    <div class="winner-score" id="winner-score"></div>
  </div>
  <div class="card" style="margin-top:16px;">
    <div class="section-title">Scores finaux</div>
    <table class="scoreboard" id="final-table"></table>
  </div>
  <div style="max-width:460px; margin:16px auto 0;">
    <button class="btn btn-primary" style="width:100%" onclick="resetGame()">Nouvelle partie</button>
  </div>
</div>

<script>
  const LIMIT = 100;
  let players = [];
  let rounds = [];
  let totals = {};
  let currentManche = 1;

  function addPlayer() {
    const container = document.getElementById('player-inputs');
    if (container.children.length >= 8) return;
    const i = container.children.length;
    const row = document.createElement('div');
    row.className = 'player-row';
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'Joueur ' + (i + 1);
    input.maxLength = 20;
    row.appendChild(input);
    if (i >= 2) {
      const btn = document.createElement('button');
      btn.className = 'btn-remove';
      btn.textContent = '×';
      btn.onclick = function() {
        if (container.children.length > 2) row.remove();
      };
      row.appendChild(btn);
    }
    container.appendChild(row);
  }

  function startGame() {
    const inputs = document.querySelectorAll('#player-inputs input');
    players = Array.from(inputs).map(function(inp, i) {
      return { name: inp.value.trim() || ('Joueur ' + (i + 1)) };
    });
    totals = {};
    players.forEach(p => totals[p.name] = 0);
    rounds = [];
    currentManche = 1;
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    renderScoreboard();
  }

  function renderScoreboard() {
    document.getElementById('manche-badge').textContent = `Manche ${currentManche}`;
    const table = document.getElementById('scoreboard');
    let header = `<thead><tr><th>Joueur</th>`;
    rounds.forEach((_, i) => header += `<th>M${i+1}</th>`);
    header += `<th>Total</th></tr></thead>`;

    const sorted = [...players].sort((a, b) => totals[a.name] - totals[b.name]);
    const leaderName = sorted[0].name;

    let body = '<tbody>';
    players.forEach(p => {
      const isLeader = rounds.length > 0 && p.name === leaderName;
      body += `<tr class="${isLeader ? 'leader-row' : ''}">`;
      body += `<td class="player-name-cell">${p.name}${isLeader ? ' 🎯' : ''}</td>`;
      rounds.forEach(r => {
        const s = r.scores[p.name];
        const isTrigger = r.trigger === p.name;
        const hasPenalty = r.doubled === p.name;
        body += `<td>`;
        if (isTrigger) body += `<span class="tag-trigger">↯</span> `;
        body += s;
        if (hasPenalty) body += `<span class="tag-penalty">×2</span>`;
        body += `</td>`;
      });
      body += `<td class="total-cell">${totals[p.name]}</td></tr>`;
    });
    body += '</tbody>';
    table.innerHTML = header + body;
  }

  function showRoundForm() {
    document.getElementById('form-title').textContent = `Manche ${currentManche} — Scores`;
    const sel = document.getElementById('trigger-select');
    sel.innerHTML = players.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
    const container = document.getElementById('round-inputs');
    container.innerHTML = '';
    players.forEach(p => {
      const row = document.createElement('div');
      row.className = 'round-row';
      row.innerHTML = `<label>${p.name}</label><input type="number" id="score-${p.name.replace(/\s/g,'_')}" value="0" min="-2" max="150" />`;
      container.appendChild(row);
    });
    document.getElementById('game').style.display = 'none';
    document.getElementById('round-form').style.display = 'block';
  }

  function cancelRound() {
    document.getElementById('round-form').style.display = 'none';
    document.getElementById('game').style.display = 'block';
  }

  function submitRound() {
    const trigger = document.getElementById('trigger-select').value;
    const rawScores = {};
    let minScore = Infinity;
    let minPlayer = null;

    players.forEach(p => {
      const key = `score-${p.name.replace(/\s/g,'_')}`;
      const val = parseInt(document.getElementById(key).value) || 0;
      rawScores[p.name] = val;
      if (val < minScore) { minScore = val; minPlayer = p.name; }
    });

    const finalScores = { ...rawScores };
    let doubled = null;
    if (trigger !== minPlayer) {
      finalScores[trigger] = rawScores[trigger] * 2;
      doubled = trigger;
    }

    rounds.push({ trigger, scores: finalScores, doubled });
    players.forEach(p => totals[p.name] += finalScores[p.name]);
    currentManche++;

    document.getElementById('round-form').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    renderScoreboard();

    if (players.some(p => totals[p.name] >= LIMIT)) showWinner();
  }

  function showWinner() {
    const sorted = [...players].sort((a, b) => totals[a.name] - totals[b.name]);
    const winner = sorted[0];
    document.getElementById('game').style.display = 'none';
    document.getElementById('winner-screen').style.display = 'block';
    document.getElementById('winner-name').textContent = winner.name;
    document.getElementById('winner-score').textContent = `${totals[winner.name]} point${Math.abs(totals[winner.name]) !== 1 ? 's' : ''} — le plus bas !`;

    const table = document.getElementById('final-table');
    let html = '<thead><tr><th>Joueur</th><th>Total</th></tr></thead><tbody>';
    sorted.forEach((p, i) => {
      html += `<tr ${i === 0 ? 'class="leader-row"' : ''}><td class="player-name-cell">${i === 0 ? '🏆 ' : ''}${p.name}</td><td class="total-cell">${totals[p.name]}</td></tr>`;
    });
    html += '</tbody>';
    table.innerHTML = html;
  }

  function resetGame() {
    players = [];
    rounds = [];
    totals = {};
    currentManche = 1;
    document.getElementById('winner-screen').style.display = 'none';
    document.getElementById('game').style.display = 'none';
    document.getElementById('round-form').style.display = 'none';
    document.getElementById('player-inputs').innerHTML = '';
    document.getElementById('setup').style.display = 'block';
    addPlayer(); addPlayer();
  }

  // Init
  addPlayer(); addPlayer();
</script>
</body>
</html>
